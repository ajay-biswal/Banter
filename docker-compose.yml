services:
  api:
    container_name: banter-api
    build: 
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    dns:
      - 8.8.8.8
      - 8.8.4.4

  web:
    container_name: banter-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api
    dns:
      - 8.8.8.8
      - 8.8.4.4

  

  

