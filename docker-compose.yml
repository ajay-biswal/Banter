version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: banter-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: banter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: banter-api
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"
    env_file:
      - apps/api/.env

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: banter-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env.local

volumes:
  mongo_data: